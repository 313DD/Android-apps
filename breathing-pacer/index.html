<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#38bdf8">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Breathe">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.svg">
    <title>Breathing Pacer</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.2);
            --text-label: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 18px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            font-size: 1.3rem;
            margin-bottom: 2px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-bottom: 14px;
        }

        .presets {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 16px;
        }

        .btn-preset {
            background-color: #334155;
            color: var(--text-main);
            border: 2px solid transparent;
            padding: 10px 4px;
            border-radius: 6px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-preset:hover {
            background-color: #475569;
        }

        .btn-preset:focus-visible {
            outline: 3px solid var(--accent);
            outline-offset: 2px;
        }

        .btn-preset.active {
            background-color: var(--accent);
            color: #000;
            font-weight: bold;
            border-color: #0c4a6e;
        }

        .pacer-area {
            height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 14px;
            position: relative;
        }

        .circle-outer {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background-color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .circle-progress {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
            position: absolute;
            transform: scale(1);
            transition: transform 0.1s linear,
                        background-color 0.4s ease,
                        box-shadow 0.4s ease;
        }

        .text-display {
            position: relative;
            z-index: 10;
            pointer-events: none;
        }

        #action-text {
            font-size: 0.95rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            margin-bottom: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        #timer-text {
            font-size: 1.6rem;
            font-weight: 800;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            background-color: #334155;
            border-radius: 10px;
            padding: 10px 16px;
            margin-bottom: 14px;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text-label);
            margin-top: 1px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .controls-grid {
            text-align: left;
            margin-bottom: 14px;
        }

        .control-group {
            margin-bottom: 12px;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-label);
            margin-bottom: 4px;
            font-weight: 500;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            accent-color: var(--accent);
            background: #334155;
            height: 5px;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        input[type="range"]:focus-visible {
            outline: 3px solid var(--accent);
            outline-offset: 2px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: 2px solid #0f172a;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            box-shadow: 0 0 8px var(--accent-glow);
        }

        input[type="range"]::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: 2px solid #0f172a;
        }

        input[type="range"]::-moz-range-thumb:hover {
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .btn-row {
            display: flex;
            gap: 8px;
        }

        .btn-main {
            flex: 1;
            background-color: var(--accent);
            color: #0f172a;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            touch-action: manipulation;
            min-height: 44px;
        }

        .btn-main:hover {
            background-color: #7dd3fc;
        }

        .btn-main:focus-visible {
            outline: 3px solid #0c4a6e;
            outline-offset: 2px;
        }

        .btn-stop {
            flex: 1;
            display: none;
            background-color: #334155;
            color: var(--text-main);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            touch-action: manipulation;
            min-height: 44px;
        }

        .btn-stop:hover {
            background-color: #475569;
        }

        .btn-stop:focus-visible {
            outline: 3px solid var(--accent);
            outline-offset: 2px;
        }

        .status-indicator {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 6px;
            display: none;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        .aria-live-region {
            position: absolute;
            left: -10000px;
            width: 1px;
            height: 1px;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Breathing Pacer</h1>
    <p class="subtitle">Settle your heart rate and regulate your nervous system</p>

    <fieldset class="presets" aria-labelledby="preset-legend">
        <legend id="preset-legend" class="sr-only">Breathing Presets</legend>
        <button class="btn-preset" id="preset-sigh" onclick="setPreset('sigh')" aria-label="Physiological Sigh - Inhale 4 seconds, Hold 1 second, Exhale 6 seconds, Rest 1 second">Physiological Sigh</button>
        <button class="btn-preset" id="preset-box" onclick="setPreset('box')" aria-label="Box Breathing - Inhale 4 seconds, Hold 4 seconds, Exhale 4 seconds, Rest 4 seconds">Box Breathing</button>
        <button class="btn-preset" id="preset-478" onclick="setPreset('478')" aria-label="4-7-8 Rhythm - Inhale 4 seconds, Hold 7 seconds, Exhale 8 seconds">4-7-8 Rhythm</button>
    </fieldset>

    <div class="pacer-area" aria-label="Breathing pacer visualization" role="img">
        <div class="circle-outer">
            <div class="circle-progress" id="pacer-circle" aria-hidden="true"></div>
            <div class="text-display">
                <div id="action-text" aria-live="polite" aria-atomic="true">READY</div>
                <div id="timer-text" aria-hidden="true">0</div>
            </div>
        </div>
    </div>

    <div class="stats" role="region" aria-label="Session statistics">
        <div class="stat">
            <div class="stat-value" id="stat-cycles">0</div>
            <div class="stat-label">Cycles</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="stat-time">0:00</div>
            <div class="stat-label">Duration</div>
        </div>
    </div>

    <div class="controls-grid" role="group" aria-labelledby="controls-title">
        <h2 id="controls-title" class="sr-only">Breathing Control Settings</h2>

        <div class="control-group">
            <label for="slide-inhale" class="control-label">
                <span>Inhale</span>
                <span id="val-inhale">4s</span>
            </label>
            <input type="range" id="slide-inhale" min="0" max="10" value="4"
                   oninput="updateSettings()" onchange="announceSettings()"
                   aria-label="Inhale duration in seconds">
        </div>

        <div class="control-group">
            <label for="slide-hold" class="control-label">
                <span>Hold (Full)</span>
                <span id="val-hold">4s</span>
            </label>
            <input type="range" id="slide-hold" min="0" max="10" value="4"
                   oninput="updateSettings()" onchange="announceSettings()"
                   aria-label="Hold breath duration in seconds">
        </div>

        <div class="control-group">
            <label for="slide-exhale" class="control-label">
                <span>Exhale</span>
                <span id="val-exhale">4s</span>
            </label>
            <input type="range" id="slide-exhale" min="0" max="10" value="4"
                   oninput="updateSettings()" onchange="announceSettings()"
                   aria-label="Exhale duration in seconds">
        </div>

        <div class="control-group">
            <label for="slide-rest" class="control-label">
                <span>Rest (Empty)</span>
                <span id="val-rest">4s</span>
            </label>
            <input type="range" id="slide-rest" min="0" max="10" value="4"
                   oninput="updateSettings()" onchange="announceSettings()"
                   aria-label="Rest duration in seconds">
        </div>
    </div>

    <div class="btn-row">
        <button class="btn-main" id="btn-toggle" onclick="togglePlay()" aria-label="Start breathing session">START</button>
        <button class="btn-stop" id="btn-stop" onclick="stopPacer()" aria-label="Stop breathing session">STOP</button>
    </div>
    <div class="status-indicator" id="wake-status" aria-label="Screen wake lock status">&#x2600;&#xFE0F; Screen Sleep Disabled</div>
</div>

<!-- Screen reader announcements -->
<div class="aria-live-region" aria-live="polite" aria-atomic="true" id="sr-announcements"></div>

<script>
    let timer = null;
    let wakeLock = null;
    let appState = 'stopped'; // 'stopped', 'running', 'paused'
    let phases = ['inhale', 'hold', 'exhale', 'rest'];
    let currentPhaseIdx = 0;
    let timeLeft = 0;
    let phaseSkipCount = 0;
    let cycleCount = 0;
    let elapsedSeconds = 0;

    // Respect the OS reduced-motion preference in JS (CSS transition is overridden by inline styles)
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const config = { inhale: 4, hold: 4, exhale: 4, rest: 4 };

    const phaseColors = {
        inhale: { bg: '#38bdf8', glow: 'rgba(56, 189, 248, 0.3)' },
        hold:   { bg: '#f59e0b', glow: 'rgba(245, 158, 11, 0.3)'  },
        exhale: { bg: '#10b981', glow: 'rgba(16, 185, 129, 0.3)'  },
        rest:   { bg: '#94a3b8', glow: 'rgba(148, 163, 184, 0.3)' }
    };

    const elements = {
        circle:          document.getElementById('pacer-circle'),
        actionText:      document.getElementById('action-text'),
        timerText:       document.getElementById('timer-text'),
        toggleBtn:       document.getElementById('btn-toggle'),
        stopBtn:         document.getElementById('btn-stop'),
        wakeStatus:      document.getElementById('wake-status'),
        statCycles:      document.getElementById('stat-cycles'),
        statTime:        document.getElementById('stat-time'),
        srAnnouncements: document.getElementById('sr-announcements')
    };

    function announceToScreenReader(message) {
        elements.srAnnouncements.textContent = message;
    }

    // Returns the appropriate transition string, skipping the transform animation
    // when the user has requested reduced motion.
    function buildTransition(durationS) {
        const colorTransition = 'background-color 0.4s ease, box-shadow 0.4s ease';
        if (reducedMotion) return colorTransition;
        return `transform ${durationS}s linear, ${colorTransition}`;
    }

    function formatTime(s) {
        const m = Math.floor(s / 60);
        return m + ':' + String(s % 60).padStart(2, '0');
    }

    function updateStats() {
        elements.statCycles.innerText = cycleCount;
        elements.statTime.innerText   = formatTime(elapsedSeconds);
    }

    function setCircleColor(phase) {
        const c = phaseColors[phase];
        elements.circle.style.backgroundColor = c.bg;
        elements.circle.style.boxShadow = `0 0 30px ${c.glow}`;
    }

    function resetCircle() {
        elements.circle.style.transition = 'none';
        elements.circle.style.transform  = 'scale(1)';
        setCircleColor('inhale');
    }

    function updateSettings() {
        config.inhale = parseInt(document.getElementById('slide-inhale').value);
        config.hold   = parseInt(document.getElementById('slide-hold').value);
        config.exhale = parseInt(document.getElementById('slide-exhale').value);
        config.rest   = parseInt(document.getElementById('slide-rest').value);

        document.getElementById('val-inhale').innerText = config.inhale + 's';
        document.getElementById('val-hold').innerText   = config.hold   + 's';
        document.getElementById('val-exhale').innerText = config.exhale + 's';
        document.getElementById('val-rest').innerText   = config.rest   + 's';

        document.querySelectorAll('.btn-preset').forEach(b => b.classList.remove('active'));
    }

    // Called once on slider release (onchange) — not on every drag tick
    function announceSettings() {
        announceToScreenReader(`Inhale ${config.inhale}s, Hold ${config.hold}s, Exhale ${config.exhale}s, Rest ${config.rest}s`);
    }

    function setPreset(type) {
        const presets = {
            sigh: { inhale: 4, hold: 1, exhale: 6, rest: 1, name: 'Physiological Sigh' },
            box:  { inhale: 4, hold: 4, exhale: 4, rest: 4, name: 'Box Breathing' },
            478:  { inhale: 4, hold: 7, exhale: 8, rest: 0, name: '4-7-8 Rhythm' }
        };
        const p = presets[type];
        document.getElementById('slide-inhale').value = p.inhale;
        document.getElementById('slide-hold').value   = p.hold;
        document.getElementById('slide-exhale').value = p.exhale;
        document.getElementById('slide-rest').value   = p.rest;

        updateSettings();
        document.getElementById('preset-' + type).classList.add('active');
        announceToScreenReader(`${p.name} preset selected`);

        if (appState !== 'stopped') stopPacer();
    }

    function togglePlay() {
        if (appState === 'running') pausePacer();
        else if (appState === 'paused') resumePacer();
        else startPacer();
    }

    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
                elements.wakeStatus.style.display = 'block';
                wakeLock.addEventListener('release', () => {
                    if (appState !== 'running') elements.wakeStatus.style.display = 'none';
                });
            }
        } catch (err) {
            console.log('Wake Lock Error:', err.name, err.message);
        }
    }

    function releaseWakeLock() {
        if (wakeLock !== null) {
            wakeLock.release();
            wakeLock = null;
            elements.wakeStatus.style.display = 'none';
        }
    }

    function startPacer() {
        if (config.inhale + config.hold + config.exhale + config.rest === 0) return;
        appState = 'running';
        cycleCount = 0;
        elapsedSeconds = 0;
        currentPhaseIdx = 0;
        phaseSkipCount = 0;
        updateStats();
        elements.toggleBtn.innerText = 'PAUSE';
        elements.toggleBtn.style.backgroundColor = '#ef4444';
        elements.toggleBtn.style.color = '#ffffff';
        elements.toggleBtn.setAttribute('aria-label', 'Pause breathing session');
        elements.stopBtn.style.display = 'block';
        initPhase();
        timer = setInterval(tick, 1000);
        requestWakeLock();
        announceToScreenReader('Breathing session started');
    }

    function pausePacer() {
        appState = 'paused';
        clearInterval(timer);
        const frozenTransform = window.getComputedStyle(elements.circle).transform;
        elements.circle.style.transition = 'none';
        elements.circle.style.transform  = frozenTransform;
        elements.toggleBtn.innerText = 'RESUME';
        elements.toggleBtn.style.backgroundColor = 'var(--accent)';
        elements.toggleBtn.style.color = '#0f172a';
        elements.toggleBtn.setAttribute('aria-label', 'Resume breathing session');
        elements.actionText.innerText = 'PAUSED';
        releaseWakeLock();
        announceToScreenReader('Breathing session paused');
    }

    function resumePacer() {
        appState = 'running';
        elements.toggleBtn.innerText = 'PAUSE';
        elements.toggleBtn.style.backgroundColor = '#ef4444';
        elements.toggleBtn.style.color = '#ffffff';
        elements.toggleBtn.setAttribute('aria-label', 'Pause breathing session');
        const phase = phases[currentPhaseIdx];
        elements.actionText.innerText = phase === 'inhale' ? 'BREATHE IN'
            : phase === 'hold'   ? 'HOLD BREATH'
            : phase === 'exhale' ? 'BREATHE OUT' : 'HOLD EMPTY';
        if (phase === 'inhale' || phase === 'exhale') {
            const target = phase === 'inhale' ? 'scale(2.2)' : 'scale(1)';
            elements.circle.getBoundingClientRect();
            elements.circle.style.transition = buildTransition(timeLeft);
            elements.circle.style.transform  = target;
        }
        timer = setInterval(tick, 1000);
        requestWakeLock();
        announceToScreenReader('Breathing session resumed');
    }

    function stopPacer() {
        appState = 'stopped';
        clearInterval(timer);
        elements.toggleBtn.innerText = 'START';
        elements.toggleBtn.style.backgroundColor = 'var(--accent)';
        elements.toggleBtn.style.color = '#0f172a';
        elements.toggleBtn.setAttribute('aria-label', 'Start breathing session');
        elements.actionText.innerText = 'READY';
        elements.timerText.innerText  = '0';
        elements.stopBtn.style.display = 'none';
        cycleCount = 0;
        elapsedSeconds = 0;
        updateStats();
        resetCircle();
        releaseWakeLock();
        announceToScreenReader('Breathing session stopped');
    }

    function initPhase() {
        const phase = phases[currentPhaseIdx];
        timeLeft = config[phase];

        if (timeLeft === 0) {
            phaseSkipCount++;
            if (phaseSkipCount >= phases.length) {
                phaseSkipCount = 0;
                pausePacer();
                return;
            }
            nextPhase();
            return;
        }
        phaseSkipCount = 0;
        elements.timerText.innerText = timeLeft;
        setCircleColor(phase);

        if (phase === 'inhale') {
            elements.actionText.innerText = 'BREATHE IN';
            elements.circle.style.transition = buildTransition(timeLeft);
            elements.circle.style.transform  = 'scale(2.2)';
        } else if (phase === 'hold') {
            elements.actionText.innerText = 'HOLD BREATH';
            elements.circle.style.transition = 'background-color 0.4s ease, box-shadow 0.4s ease';
        } else if (phase === 'exhale') {
            elements.actionText.innerText = 'BREATHE OUT';
            elements.circle.style.transition = buildTransition(timeLeft);
            elements.circle.style.transform  = 'scale(1)';
        } else if (phase === 'rest') {
            elements.actionText.innerText = 'HOLD EMPTY';
            elements.circle.style.transition = 'background-color 0.4s ease, box-shadow 0.4s ease';
        }
    }

    function tick() {
        timeLeft--;
        elapsedSeconds++;
        if (timeLeft <= 0) {
            nextPhase();
        } else {
            elements.timerText.innerText = timeLeft;
        }
        updateStats();
    }

    function nextPhase() {
        currentPhaseIdx = (currentPhaseIdx + 1) % phases.length;
        if (currentPhaseIdx === 0) cycleCount++;
        initPhase();
    }

    document.addEventListener('visibilitychange', async () => {
        if (wakeLock !== null && document.visibilityState === 'visible' && appState === 'running') {
            await requestWakeLock();
        }
    });

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
    }

    setPreset('box');
</script>
</body>
</html>
